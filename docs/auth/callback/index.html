<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening LottoPilot...</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #0c1629;
      color: #e2e8f0;
      text-align: center;
    }
    h1 { font-size: 1.25rem; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 0.95rem; margin: 0 0 16px; }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #334155;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #f59e0b; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h1>Opening LottoPilot...</h1>
  <p id="msg">If the app doesn't open, please open LottoPilot manually.</p>
  <script>
    (function() {
      var hash = window.location.hash;
      if (hash && hash.indexOf('access_token=') !== -1) {
        var appUrl = 'lottopilot://auth/callback' + hash;
        window.location.replace(appUrl);
        document.getElementById('msg').textContent = 'Redirecting to app...';
      } else {
        document.getElementById('msg').textContent = 'No auth data found. Please try the confirmation link again from your email.';
      }
    })();
  </script>
</body>
</html>
